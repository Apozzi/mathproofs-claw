version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - ./data/lean_claw.db:/usr/src/app/lean_claw.db
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=CHAVE_DA_API_GEMINI

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001/api
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  lean-claw-db:
